<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none">
  <!-- Renaissance-inspired composition: golden ratio spirals, Vitruvian-style radial lines,
       modern dataflow nodes, generous whitespace. Abstract, aesthetic, minimal. -->

  <!-- Subtle grid - Da Vinci notebook feel -->
  <defs>
    <linearGradient id="fade-down" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0A0A0F" stop-opacity="1"/>
      <stop offset="0.4" stop-color="#0A0A0F" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#0A0A0F" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="teal-fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00D4AA" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#00D4AA" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="amber-fade" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFB84D" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#FFB84D" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="#0A0A0F"/>

  <!-- Ambient glow - top right (Renaissance light source) -->
  <ellipse cx="1400" cy="200" rx="600" ry="400" fill="url(#teal-fade)"/>
  <ellipse cx="500" cy="800" rx="400" ry="300" fill="url(#amber-fade)"/>

  <!-- Golden ratio spiral (Fibonacci) - very subtle -->
  <path d="M960 540 Q1060 540 1060 440 Q1060 340 960 340 Q760 340 760 540 Q760 840 1060 840 Q1560 840 1560 340"
        stroke="#00D4AA" stroke-width="0.5" stroke-opacity="0.12" fill="none"/>
  <path d="M960 540 Q860 540 860 640 Q860 740 960 740 Q1160 740 1160 540 Q1160 240 860 240 Q360 240 360 740"
        stroke="#FFB84D" stroke-width="0.5" stroke-opacity="0.08" fill="none"/>

  <!-- Vitruvian radial lines from center -->
  <g stroke="#5A5A7A" stroke-width="0.3" stroke-opacity="0.08">
    <line x1="960" y1="540" x2="960" y2="0"/>
    <line x1="960" y1="540" x2="1920" y2="540"/>
    <line x1="960" y1="540" x2="960" y2="1080"/>
    <line x1="960" y1="540" x2="0" y2="540"/>
    <line x1="960" y1="540" x2="1920" y2="0"/>
    <line x1="960" y1="540" x2="0" y2="0"/>
    <line x1="960" y1="540" x2="1920" y2="1080"/>
    <line x1="960" y1="540" x2="0" y2="1080"/>
  </g>

  <!-- Concentric circles (Vitruvian proportion) -->
  <circle cx="960" cy="540" r="120" stroke="#00D4AA" stroke-width="0.5" stroke-opacity="0.06"/>
  <circle cx="960" cy="540" r="240" stroke="#00D4AA" stroke-width="0.5" stroke-opacity="0.05"/>
  <circle cx="960" cy="540" r="400" stroke="#5A5A7A" stroke-width="0.3" stroke-opacity="0.04"/>
  <circle cx="960" cy="540" r="600" stroke="#5A5A7A" stroke-width="0.3" stroke-opacity="0.03"/>

  <!-- Dataflow nodes - abstract constellation (top right quadrant, Renaissance off-center) -->
  <!-- Central node -->
  <circle cx="1300" cy="300" r="6" fill="#00D4AA" fill-opacity="0.6"/>
  <circle cx="1300" cy="300" r="12" stroke="#00D4AA" stroke-width="0.8" stroke-opacity="0.3" fill="none"/>

  <!-- Connected nodes -->
  <circle cx="1500" cy="220" r="4" fill="#FFB84D" fill-opacity="0.5"/>
  <circle cx="1450" cy="420" r="5" fill="#00D4AA" fill-opacity="0.4"/>
  <circle cx="1150" cy="250" r="3.5" fill="#4A4AFF" fill-opacity="0.4"/>
  <circle cx="1200" cy="400" r="4" fill="#5A5A7A" fill-opacity="0.4"/>
  <circle cx="1550" cy="350" r="3" fill="#00D4AA" fill-opacity="0.3"/>
  <circle cx="1100" cy="350" r="3" fill="#FFB84D" fill-opacity="0.3"/>

  <!-- Connection lines (dataflow edges) -->
  <line x1="1300" y1="300" x2="1500" y2="220" stroke="#00D4AA" stroke-width="0.8" stroke-opacity="0.2"/>
  <line x1="1300" y1="300" x2="1450" y2="420" stroke="#00D4AA" stroke-width="0.8" stroke-opacity="0.15"/>
  <line x1="1300" y1="300" x2="1150" y2="250" stroke="#4A4AFF" stroke-width="0.6" stroke-opacity="0.15"/>
  <line x1="1300" y1="300" x2="1200" y2="400" stroke="#5A5A7A" stroke-width="0.6" stroke-opacity="0.12"/>
  <line x1="1500" y1="220" x2="1550" y2="350" stroke="#00D4AA" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="1150" y1="250" x2="1100" y2="350" stroke="#FFB84D" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="1200" y1="400" x2="1100" y2="350" stroke="#5A5A7A" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="1450" y1="420" x2="1550" y2="350" stroke="#00D4AA" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- Second cluster (bottom left, smaller - Renaissance depth) -->
  <circle cx="350" cy="700" r="4" fill="#FFB84D" fill-opacity="0.3"/>
  <circle cx="450" cy="750" r="3" fill="#00D4AA" fill-opacity="0.25"/>
  <circle cx="300" cy="780" r="3" fill="#4A4AFF" fill-opacity="0.2"/>
  <circle cx="400" cy="650" r="2.5" fill="#5A5A7A" fill-opacity="0.2"/>
  <line x1="350" y1="700" x2="450" y2="750" stroke="#00D4AA" stroke-width="0.5" stroke-opacity="0.1"/>
  <line x1="350" y1="700" x2="300" y2="780" stroke="#4A4AFF" stroke-width="0.4" stroke-opacity="0.08"/>
  <line x1="350" y1="700" x2="400" y2="650" stroke="#5A5A7A" stroke-width="0.4" stroke-opacity="0.08"/>

  <!-- Flowing curves (data streams - Renaissance drapery abstracted) -->
  <path d="M200 900 Q500 800 800 850 Q1100 900 1400 750 Q1600 650 1800 700"
        stroke="#00D4AA" stroke-width="0.6" stroke-opacity="0.06" fill="none"/>
  <path d="M100 950 Q400 850 700 880 Q1000 910 1300 800 Q1500 720 1750 760"
        stroke="#FFB84D" stroke-width="0.4" stroke-opacity="0.04" fill="none"/>

  <!-- Geometric construction lines (Da Vinci sketch feel) -->
  <line x1="640" y1="0" x2="640" y2="1080" stroke="#5A5A7A" stroke-width="0.2" stroke-opacity="0.04"/>
  <line x1="1280" y1="0" x2="1280" y2="1080" stroke="#5A5A7A" stroke-width="0.2" stroke-opacity="0.04"/>
  <line x1="0" y1="360" x2="1920" y2="360" stroke="#5A5A7A" stroke-width="0.2" stroke-opacity="0.04"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="#5A5A7A" stroke-width="0.2" stroke-opacity="0.04"/>

  <!-- Small accent dots (stars / data points) -->
  <circle cx="1700" cy="150" r="1.5" fill="#00D4AA" fill-opacity="0.2"/>
  <circle cx="200" cy="200" r="1" fill="#FFB84D" fill-opacity="0.15"/>
  <circle cx="1800" cy="500" r="1" fill="#4A4AFF" fill-opacity="0.15"/>
  <circle cx="150" cy="500" r="1.5" fill="#00D4AA" fill-opacity="0.1"/>
  <circle cx="1600" cy="900" r="1" fill="#FFB84D" fill-opacity="0.1"/>
  <circle cx="800" cy="150" r="1" fill="#5A5A7A" fill-opacity="0.1"/>
</svg>
